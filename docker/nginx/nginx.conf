user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    fastcgi_cache_path /var/cache/nginx/wordpress
        levels=1:2
        keys_zone=WORDPRESS:100m
        inactive=60m
        max_size=5g
        use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;

    map $request_method $skip_cache_method {
        default 1;
        GET     0;
        HEAD    0;
    }

    map $query_string $skip_cache_query {
        default 1;
        ""      0;
    }

    map $request_uri $skip_cache_uri {
        default 0;

        ~^/wp-admin/          1;
        ~^/wp-login\.php      1;
        ~^/wp-cron\.php       1;
        ~^/wp-json/           1;
        ~^/xmlrpc\.php        1;

        ~^/cart/?             1;
        ~^/checkout/?         1;
        ~^/my-account/?       1;

        ~^/wc-api/            1;
        ~^/\?wc-ajax=         1;
    }

    map $http_cookie $skip_cache_cookie {
        default 0;

        ~*wordpress_logged_in_             1;
        ~*wordpress_sec_                   1;
        ~*wp-postpass_                     1;
        ~*comment_author_                  1;

        ~*woocommerce_items_in_cart        1;
        ~*woocommerce_cart_hash            1;
        ~*wp_woocommerce_session_          1;
    }

    map "$skip_cache_method$skip_cache_query$skip_cache_uri$skip_cache_cookie" $skip_cache {
        default 0;
        ~1      1;
    }
}