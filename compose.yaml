name: local-wp-site

services:
  db:
    image: mariadb:11.4.12
    restart: unless-stopped

    environment:
      MARIADB_DATABASE: ${WP_DB_NAME:-wordpress}
      MARIADB_USER: ${WP_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD:?WP_DB_ROOT_PASSWORD is required}

    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/conf.d/local.cnf:/etc/mysql/conf.d/zz-local.cnf:ro
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro

    networks:
      - backend

    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    mem_limit: 768m
    cpus: 1.0
    pids_limit: 512

  wordpress:
    image: wordpress:7.0.1-php8.4-fpm
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/php/dockerfile
      # target: development

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: "1"

      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', getenv_docker('WP_ENVIRONMENT_TYPE', 'local'));
        define('FS_METHOD', 'direct');
        define('DISALLOW_FILE_EDIT', false);
        define('DISABLE_WP_CRON', true);
        define('WP_ALLOW_MULTISITE', true);
        define('MULTISITE', true);
        define('SUBDOMAIN_INSTALL', false);
        define('WP_HOME', getenv_docker('WP_HOME', 'http://localhost'));
        define('WP_SITEURL', getenv_docker('WP_SITEURL', 'http://localhost'));
        define('DOMAIN_CURRENT_SITE', getenv_docker('DOMAIN_CURRENT_SITE', 'nuetech.test'));
        define('PATH_CURRENT_SITE', getenv_docker('PATH_CURRENT_SITE', '/'));
        define('SITE_ID_CURRENT_SITE', 1);
        define('BLOG_ID_CURRENT_SITE', 1);
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_PREFIX', 'local-wp-site:');
        define('WP_CACHE_KEY_SALT', 'local-wp-site:');

    volumes:
      - ./wordpress:/var/www/html
      - ./app/themes/company-block-theme:/var/www/html/wp-content/themes/company-block-theme
      - ./app/plugins/company-feedback:/var/www/html/wp-content/plugins/company-feedback
      - ./app/plugins/company-fulfilment:/var/www/html/wp-content/plugins/company-fulfilment
      - ./docker/php/conf.d/local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro
      - ./docker/php/conf.d/woocommerce.ini:/usr/local/etc/php/conf.d/zz-woocommerce.ini:ro
      - ./docker/php/fpm.d/zz-local-pool.conf:/usr/local/etc/php-fpm.d/zz-local-pool.conf:ro

    networks:
      - frontend
      - backend

    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256

  nginx:
    image: nginx:1.30.3-alpine
    restart: unless-stopped

    depends_on:
      wordpress:
        condition: service_started

    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"

    volumes:
      - ./wordpress:/var/www/html:ro
      - ./app/themes/company-block-theme:/var/www/html/wp-content/themes/company-block-theme:ro
      - ./app/plugins/company-feedback:/var/www/html/wp-content/plugins/company-feedback:ro
      - ./app/plugins/company-fulfilment:/var/www/html/wp-content/plugins/company-fulfilment:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - frontend
      - backend

    mem_limit: 256m
    cpus: 1.0
    pids_limit: 128

  redis:
    image: redis:8-alpine
    restart: unless-stopped

    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lfu
      - --save
      - ""

    networks:
      - backend

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5

    mem_limit: 700m
    cpus: 1.0
    pids_limit: 128

  node:
    image: node:24-alpine
    working_dir: /app

    volumes:
      - ./app/themes/company-block-theme:/app
      - theme_node_modules:/app/node_modules

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    ports:
      - "127.0.0.1:5173:5173"

    profiles:
      - frontend

  composer:
    image: composer:2
    working_dir: /app

    volumes:
      - ./app/plugins/company-feedback:/app

    profiles:
      - tools

  wpcli:
    image: wordpress:cli-php8.4
    user: "33:33"

    depends_on:
      db:
        condition: service_healthy

    working_dir: /var/www/html

    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: "1"

      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', getenv_docker('WP_ENVIRONMENT_TYPE', 'local'));
        define('FS_METHOD', 'direct');
        define('DISABLE_WP_CRON', true);
        define('WP_ALLOW_MULTISITE', true);
        define('MULTISITE', true);
        define('SUBDOMAIN_INSTALL', false);
        define('WP_HOME', getenv_docker('WP_HOME', 'http://localhost'));
        define('WP_SITEURL', getenv_docker('WP_SITEURL', 'http://localhost'));
        define('DOMAIN_CURRENT_SITE', getenv_docker('DOMAIN_CURRENT_SITE', 'nuetech.test'));
        define('PATH_CURRENT_SITE', getenv_docker('PATH_CURRENT_SITE', '/'));
        define('SITE_ID_CURRENT_SITE', 1);
        define('BLOG_ID_CURRENT_SITE', 1);
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_PREFIX', 'local-wp-site:');
        define('WP_CACHE_KEY_SALT', 'local-wp-site:');

    volumes:
      - ./wordpress:/var/www/html
      - ./app/themes/company-block-theme:/var/www/html/wp-content/themes/company-block-theme
      - ./app/plugins/company-feedback:/var/www/html/wp-content/plugins/company-feedback
      - ./app/plugins/company-fulfilment:/var/www/html/wp-content/plugins/company-fulfilment
      - ./docker/php/conf.d/local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro

    networks:
      - frontend
      - backend

    profiles:
      - tools

  wpcron:
    image: wordpress:cli-php8.4
    user: "33:33"

    depends_on:
      db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command: >
      while true;
      do
        wp cron event run --due-now --path=/var/www/html || true;
        sleep 60;
      done

    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ALLOW_MULTISITE', true);
        define('MULTISITE', true);
        define('SUBDOMAIN_INSTALL', false);
        define('WP_HOME', getenv_docker('WP_HOME', 'http://localhost'));
        define('WP_SITEURL', getenv_docker('WP_SITEURL', 'http://localhost'));
        define('DOMAIN_CURRENT_SITE', getenv_docker('DOMAIN_CURRENT_SITE', 'nuetech.test'));
        define('PATH_CURRENT_SITE', getenv_docker('PATH_CURRENT_SITE', '/'));
        define('SITE_ID_CURRENT_SITE', 1);
        define('BLOG_ID_CURRENT_SITE', 1);

    volumes:
      - ./wordpress:/var/www/html

    networks:
      - frontend
      - backend

    profiles:
      - tools

networks:
  frontend:

  backend:
    internal: true

volumes:
  db_data:
  theme_node_modules: